<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Word Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
overflow:hidden;
}

.card{
width:420px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 50px rgba(0,0,0,.4);
color:white;
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
font-weight:700;
background:linear-gradient(135deg,#60a5fa,#8b5cf6);
margin-bottom:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

.input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.12);
color:white;
}

.input::placeholder{
color:#ddd;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:600;
background:#3b82f6;
color:white;
margin-top:10px;
}

.btn:hover{
opacity:.9;
}

.google-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:12px;
background:white;
color:black;
font-weight:600;
}

.row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:10px;
}

a{
color:#93c5fd;
text-decoration:none;
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
opacity:.8;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">N</div>

<h1>Nexora Word</h1>
<p>AI Powered Workspace</p>

<form id="loginForm">

<input
type="email"
id="email"
class="input"
placeholder="Email Address"
required>

<input
type="password"
id="password"
class="input"
placeholder="Password"
required>

<div class="row">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button class="btn" type="submit">
Login
</button>

<button class="google-btn" type="button" onclick="googleLogin()">
🔵 Continue with Google
</button>

</form>

<div class="footer">
Nexora Word © 2026
</div>

</div>

<script>
document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

const email =
document.getElementById("email").value;

localStorage.setItem("nexoraUser",email);

window.location.href="home.html";
});

function googleLogin(){

// Replace with actual Google OAuth later

localStorage.setItem(
"nexoraUser",
"Google User"
);

window.location.href="home.html";
}
</script>

</body>
</html>
