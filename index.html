<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Word - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    overflow:hidden;
}

.bg{
    position:absolute;
    width:100%;
    height:100%;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    animation:float 8s infinite ease-in-out;
}

.c1{
    width:300px;
    height:300px;
    background:#3b82f6;
    top:10%;
    left:10%;
}

.c2{
    width:250px;
    height:250px;
    background:#8b5cf6;
    bottom:10%;
    right:10%;
}

@keyframes float{
    50%{
        transform:translateY(-30px);
    }
}

.login-card{
    width:420px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
    z-index:2;
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#60a5fa,#8b5cf6);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
    box-shadow:0 0 40px rgba(96,165,250,.8);
}

h1{
    font-size:32px;
    margin-bottom:8px;
}

.subtitle{
    color:#cbd5e1;
    margin-bottom:30px;
}

.google-container{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.user-info{
    margin-top:25px;
    display:none;
}

.user-info img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid white;
    margin-bottom:15px;
}

.user-name{
    font-size:22px;
    font-weight:600;
}

.user-email{
    color:#cbd5e1;
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    font-size:13px;
}
</style>
</head>
<body>

<div class="bg">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
</div>

<div class="login-card">

    <div class="logo">N</div>

    <h1>Nexora Word</h1>
    <p class="subtitle">AI-Powered Smart Workspace</p>

    <div id="g_id_onload"
         data-client_id="600517619057-sas7435k18ofgpsu8inhbg41i6qfd68d.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>

    <div class="google-container">
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="filled_blue"
             data-text="signin_with"
             data-size="large">
        </div>
    </div>

    <div class="user-info" id="userInfo">
        <img id="userPic">
        <div class="user-name" id="userName"></div>
        <div class="user-email" id="userEmail"></div>
    </div>

    <div class="footer">
        Secure Google Authentication
    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
function parseJwt(token) {
    let base64Url = token.split('.')[1];
    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    let jsonPayload = decodeURIComponent(
        atob(base64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );
    return JSON.parse(jsonPayload);
}

function handleCredentialResponse(response) {

    const data = parseJwt(response.credential);

    document.getElementById("userInfo").style.display = "block";

    document.getElementById("userPic").src = data.picture;
    document.getElementById("userName").innerText = data.name;
    document.getElementById("userEmail").innerText = data.email;

    console.log("User Logged In:", data);

    // Redirect Example
    // window.location.href = "dashboard.html";
}
</script>

</body>
</html>
